kind: Fixed
body: >-
  Refreshed stale external URL references across documentation surfaces from
  the 2026-04-13 link-health audit (gina-io/gina#18). `README.md`,
  `packages/swig-core/README.md`, `packages/swig-twig/README.md` — swapped
  `www.npmjs.org` for the canonical `www.npmjs.com` in the NPM badges (the
  old `.org` form now redirects). `README.md` — rewrote the "Swig v0.x → v1.x
  migration notes" bullet, since the `paularmstrong/swig/wiki/Migrating-from-...`
  page was deleted upstream (302s to repo root). `HISTORY.md` — dropped the
  three dead upstream-wiki links around the v1.0.0 / v1.0.0-pre1 entries; the
  breaking-change prose stays intact. `browser/comments.js` — updated the DateZ
  `@license` URL from `TomoUniversalis/DateZ` to `ocrybit/DateZ` (the upstream
  GitHub user was renamed). `packages/swig-core/lib/dateformatter.js` — dropped
  the dead `http://tomouniversalis.com` parenthetical from the DateZ copyright
  comment (domain NXDOMAINs). `.changes/v1.0.0.md` and `.changes/v1.0.0-pre1.md`
  synced to match the rewritten `HISTORY.md` lines so future
  `changie merge` runs stay idempotent. Documentation and comment-only; no
  runtime or API change.
